<!-- Sticky Header -->
<mat-toolbar color="primary" class="mat-elevation-z4 header">
  <!-- Mobile menu button -->
  <button
    mat-icon-button
    (click)="sidenav.toggle()"
    class="menu-button"
    aria-label="Menu"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <span class="header-title">Kyobi Travel</span>
  <span class="spacer"></span>

  <!-- Desktop Navigation -->
  <nav class="desktop-nav">
    <button mat-button class="nav-bar-buttons" color="primary">Home</button>
    <button mat-button class="nav-bar-buttons" color="primary">About</button>

    <!-- Dropdown -->
    <button mat-button [matMenuTriggerFor]="servicesMenu" class="nav-bar-buttons" color="primary">Services</button>
    <mat-menu #servicesMenu="matMenu">
      <button mat-menu-item class="nav-bar-buttons" color="primary">Web Development</button>
      <button mat-menu-item class="nav-bar-buttons" color="primary">Mobile Apps</button>
      <button mat-menu-item class="nav-bar-buttons" color="primary">UI/UX Design</button>
    </mat-menu>

    <button mat-button class="nav-bar-buttons" color="primary">Contact</button>
  </nav>
</mat-toolbar>

<!-- Sidenav + Main Content -->
<mat-sidenav-container class="sidenav-container">
  <!-- MOBILE ONLY sidenav -->
  <mat-sidenav #sidenav mode="over" class="mobile-nav">
    <mat-nav-list>
      <a mat-list-item (click)="sidenav.close()">Home</a>
      <a mat-list-item (click)="sidenav.close()">About</a>

      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>Services</mat-panel-title>
        </mat-expansion-panel-header>
        <a mat-list-item (click)="sidenav.close()">Web Development</a>
        <a mat-list-item (click)="sidenav.close()">Mobile Apps</a>
        <a mat-list-item (click)="sidenav.close()">UI/UX Design</a>
      </mat-expansion-panel>

      <a mat-list-item (click)="sidenav.close()">Contact</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>
      <app-home-banner></app-home-banner>
      <app-introduction></app-introduction>
  </mat-sidenav-content>
</mat-sidenav-container>



<router-outlet></router-outlet>
