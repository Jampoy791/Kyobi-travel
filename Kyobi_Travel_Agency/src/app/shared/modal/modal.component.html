<!-- LOGIN MODAL -->
<div id="modal-login" class="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>SIGN IN</h2>
    <div class="form-group" style="margin-bottom:14px">
      <label>Email</label>
      <input type="email" placeholder="you@email.com">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="closeModal();showToast('Welcome back, traveler!')">Login →</button>
    <div class="modal-toggle">Don't have an account? <a onclick="closeModal();openModal('signup')">Sign Up</a></div>
  </div>
</div>
 
<!-- SIGNUP MODAL -->
<div id="modal-signup" class="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>JOIN US</h2>
    <div class="form-grid-2" style="margin-bottom:14px">
      <div class="form-group"><label>First Name</label><input type="text" placeholder="Juan"></div>
      <div class="form-group"><label>Last Name</label><input type="text" placeholder="dela Cruz"></div>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Email</label>
      <input type="email" placeholder="you@email.com">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" placeholder="Create a strong password">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="closeModal();showToast('Account created! Welcome aboard 🎉')">Create Account →</button>
    <div class="modal-toggle">Already have an account? <a onclick="closeModal();openModal('login')">Login</a></div>
  </div>
</div>
