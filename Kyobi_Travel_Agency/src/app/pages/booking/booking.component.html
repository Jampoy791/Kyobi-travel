<div class="page">

  <h1 class="section-title">
    {{ destination ? (destination | uppercase) : 'BOOK YOUR TRIP' }}
  </h1>

  <!-- FORM -->
  <div class="booking-layout">

    <div>
      <form (ngSubmit)="confirmBooking()">
        <!-- Trip Details -->
        <div class="booking-form-card">
          <div class="form-section-title">Trip Details</div>

          <input type="text" name="destination" [(ngModel)]="destination" placeholder="Where are you going?">

          <select name="travelers" [(ngModel)]="travelers">
            <option [ngValue]="1">1</option>
            <option [ngValue]="2">2</option>
            <option [ngValue]="3">3</option>
            <option [ngValue]="4">4</option>
            <option [ngValue]="5">5+</option>
          </select>

          <select name="room" [(ngModel)]="room">
            <option [ngValue]="0">Standard Room</option>
            <option [ngValue]="200">Deluxe Room (+$200)</option>
            <option [ngValue]="500">Suite (+$500)</option>
            <option [ngValue]="1200">Villa (+$1,200)</option>
          </select>

        </div>

        <!-- Confirm -->
        <button type="submit">
          ✅ Confirm Booking
        </button>
      </form>

    </div>

    <!-- SUMMARY -->
    <div class="order-summary">

      <div>Destination: {{ destination || '—' }}</div>

      <div>
        Travelers:
        {{ travelers }} {{ travelers === 1 ? 'Adult' : 'Adults' }}
      </div>

      <div>Base: ${{ base }}</div>

      <div>
        Room:
        {{ roomExtra > 0 ? ('$' + roomExtra) : 'Included' }}
      </div>

      <div>Tax: ${{ tax }}</div>

      <div><strong>Total: ${{ total }}</strong></div>

    </div>

  </div>
</div>
