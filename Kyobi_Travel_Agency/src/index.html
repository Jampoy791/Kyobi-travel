<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>KyobiTravelAgency</title>
  <base href="/">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kyobi — Travel Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Archivo+Black&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="mat-typography">
  <app-root></app-root>
  <script>
  // ===== PAGE NAVIGATION =====
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if (id === 'search') buildResultsList();
    if (id === 'budget') updateBudget();
  }

  // ===== TABS =====
  function switchTab(btn, contentId) {
    btn.closest('.search-widget').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.closest('.search-widget').querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(contentId).classList.add('active');
  }

  // ===== DARK MODE =====
  function toggleDark() {
    document.body.classList.toggle('dark');
    document.getElementById('darkToggle').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
  }

  // ===== MODAL =====
  function openModal(type) {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
    document.getElementById('modal-' + type).classList.add('open');
  }

  function closeModal() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
  }

  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', function(e) {
      if (e.target === m) closeModal();
    });
  });

  // ===== TOAST =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ===== WISHLIST =====
  const wishlist = new Set();

  function toggleWishlist(btn, name) {
    if (wishlist.has(name)) {
      wishlist.delete(name);
      btn.textContent = '🤍';
      btn.classList.remove('saved');
      showToast(name + ' removed from wishlist');
    } else {
      wishlist.add(name);
      btn.textContent = '❤️';
      btn.classList.add('saved');
      showToast(name + ' saved to wishlist!');
    }
  }

  // ===== SEARCH =====
  function doSearch() {
    const q = document.getElementById('flightRoute').value || 'All Destinations';
    document.getElementById('searchHeading').textContent = q.toUpperCase();
    showPage('search');
  }

  // ===== RESULTS =====
  const mockResults = [
    { type:'Hotel', name:'The Mulia Bali', loc:'Nusa Dua, Bali', price:349, stars:5, img:'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&q=70', chips:['Pool','Spa','WiFi','Beach'] },
    { type:'Flight', name:'MNL → NRT Return', loc:'Philippine Airlines · 4h 20m', price:599, stars:4, img:'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=400&q=70', chips:['Direct','Meals','Baggage'] },
    { type:'Hotel', name:'Hotel de Crillon', loc:'Paris, France', price:890, stars:5, img:'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400&q=70', chips:['Pool','Spa','Concierge'] },
    { type:'Package', name:'Thailand 10-Night Bundle', loc:'Phuket + Koh Samui', price:2199, stars:4, img:'https://images.unsplash.com/photo-1552733407-5d5c46c3bb3b?w=400&q=70', chips:['Flight','Hotel','Tours'] },
    { type:'Hotel', name:'Park Hyatt Tokyo', loc:'Shinjuku, Tokyo', price:520, stars:5, img:'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=400&q=70', chips:['Pool','Bar','City View'] },
    { type:'Flight', name:'MNL → SIN Return', loc:'Singapore Airlines · 3h 15m', price:280, stars:5, img:'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=400&q=70', chips:['Direct','Premium','Meals'] },
  ];

  function buildResultsList() {
    const c = document.getElementById('resultsList');
    c.innerHTML = mockResults.map((r,i) => `
      <div class="result-card" style="animation-delay:${i*0.08}s">
        <div class="result-img">
          <img src="${r.img}" alt="${r.name}" loading="lazy">
        </div>
        <div class="result-body">
          <div class="result-type">${r.type === 'Hotel' ? '🏨' : r.type === 'Flight' ? '✈' : '📦'} ${r.type}</div>
          <div class="result-name">${r.name}</div>
          <div class="result-location">📍 ${r.loc}</div>
          <div class="result-chips">${r.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
        </div>
        <div class="result-price-side">
          <div class="result-rating">
            <span class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
            ${r.stars}.0 / 5
          </div>
          <div>
            <div class="result-price">$${r.price.toLocaleString()}<small>/person</small></div>
            <button class="btn btn-primary" style="margin-top:10px;font-size:11px;padding:8px 14px" onclick="openBooking('${r.name}', ${r.price})">Book →</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ===== STAR FILTER =====
  function toggleStar(btn) {
    btn.closest('.star-filter').querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    showToast('Rating filter applied');
  }

  // ===== BOOKING =====
  let currentPrice = 0;

  function openBooking(dest, price) {
    currentPrice = price;
    document.getElementById('bookingDestTitle').textContent = dest.toUpperCase();
    document.getElementById('bkDestination').value = dest;
    document.getElementById('sum-dest').textContent = dest;
    updateOrderSummary();
    showPage('booking');
  }

  function updateOrderSummary() {
    const travelers = parseInt(document.getElementById('bkAdults').value) || 2;
    const roomSel = document.getElementById('bkRoom').value;
    let roomExtra = 0;
    if (roomSel.includes('+$200')) roomExtra = 200;
    if (roomSel.includes('+$500')) roomExtra = 500;
    if (roomSel.includes('+$1,200')) roomExtra = 1200;

    const base = currentPrice * travelers;
    const tax = Math.round(base * 0.12);
    const total = base + roomExtra + tax;

    document.getElementById('sum-travelers').textContent = travelers + (travelers === 1 ? ' Adult' : ' Adults');
    document.getElementById('sum-base').textContent = '$' + base.toLocaleString();
    document.getElementById('sum-room').textContent = roomExtra > 0 ? '+$' + roomExtra.toLocaleString() : 'Included';
    document.getElementById('sum-tax').textContent = '$' + tax.toLocaleString();
    document.getElementById('sum-total').textContent = '$' + total.toLocaleString();
  }

  function confirmBooking() {
    const dest = document.getElementById('bkDestination').value || 'your destination';
    showPage('home');
    setTimeout(() => {
      showToast('🎉 Booking confirmed for ' + dest + '! Check your email.');
    }, 500);
  }

  // ===== BUDGET PLANNER =====
  const CIRC = 251.2;
  const sliders = ['flights','hotels','food','activities','shopping'];
  const colors = { flights:'#1E5CFF', hotels:'#FFD600', food:'#FF6B35', activities:'#00C896', shopping:'#C456F0' };

  function updateSlider(name) {
    const val = parseInt(document.getElementById('sl-'+name).value);
    document.getElementById('val-'+name).textContent = '$' + val.toLocaleString();
    updateBudget();
  }

  function updateBudget() {
    const total = parseInt(document.getElementById('totalBudget').value) || 5000;
    let spent = 0;
    const vals = {};

    sliders.forEach(s => {
      const v = parseInt(document.getElementById('sl-'+s).value) || 0;
      vals[s] = v;
      spent += v;
      document.getElementById('val-'+s).textContent = '$' + v.toLocaleString();
      document.getElementById('leg-'+s).textContent = '$' + v.toLocaleString();
    });

    const remaining = total - spent;
    document.getElementById('donutRemaining').textContent = (remaining < 0 ? '-$' : '$') + Math.abs(remaining).toLocaleString();
    document.getElementById('leg-remaining').textContent = (remaining < 0 ? '-$' : '$') + Math.abs(remaining).toLocaleString();

    const warn = document.getElementById('budgetWarning');
    warn.style.display = remaining < 0 ? 'block' : 'none';

    // Update donut rings
    let offset = 0;
    sliders.forEach(s => {
      const ring = document.getElementById('ring-'+s);
      const pct = total > 0 ? (vals[s] / total) : 0;
      const arc = Math.min(pct, 1) * CIRC;
      ring.setAttribute('stroke-dasharray', arc + ' ' + CIRC);
      ring.setAttribute('stroke-dashoffset', -offset);
      ring.setAttribute('stroke', colors[s]);
      offset += arc;
    });
  }

  // ===== INIT =====
  // Set default dates
  const today = new Date();
  const nextMonth = new Date(today.getTime() + 30 * 86400000);
  const twoMonths = new Date(today.getTime() + 45 * 86400000);

  function fmt(d) { return d.toISOString().split('T')[0]; }

  ['flightDep','bkDep'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = fmt(nextMonth);
  });
  ['flightRet','bkRet'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = fmt(twoMonths);
  });

  // Init budget
  updateBudget();
</script>
</body>
</html>
